<html>
<head></head>
<body>
   <form style="background-color:rgb(202, 32, 32);">
    <fieldset><legend style="background-color:rgb(69, 132, 169); ">Personal Data</legend>
        <fieldset style="background-color:rgb(232, 206, 64);"><legend style="background-color:rgb(22, 154, 230) ;">Your Name</legend>
        
        <br/>
            
        <table>
            <tr>
                <td> <label for="fname">First Name</label></td>
                <td>:</td>
                <td><input id="fname" placeholder="ex ahmed" type="text"></td>
            
            </tr>
            <tr>
                <td> <label for="lname">Last Name</label></td>
                <td>:</td>
                <td><input id="lname" placeholder="ex ali" type="text"></td>
            
            </tr>
        </table>
        </fieldset>
    <table>
        <br/>
        <br/>
        <tr>
            <td> <label for="phone">your Phone</label></td>
            <td>:</td>
            <td><input id="phone" placeholder="ex ahmed" type="text"></td>
        
        </tr>   
        <tr>
            <td> <label for="mail">Email</label></td>
            <td>:</td>
            <td><input id="mail" placeholder="xx@xxx.ds" type="email"></td>
        
        </tr> 
        <tr>
            <td> <label for="pwd">Password</label></td>
            <td>:</td>
            <td><input id="pwd" placeholder="******" type="password"></td>
        
        </tr> 
        <tr>
            <td> <label for="rpwd">re-password</label></td>
            <td>:</td>
            <td><input id="rpwd" placeholder="******" type="password"></td>
        
        </tr> 
    
    </table>
    <br/>
    <input type="radio" id="Male" value="Male" name="gender"><label for="Male">Male</label>
    <br />
    <input type="radio" id="Female" value="Female" name="gender"><label for="Female">Female</label>
    <br/>
    <br/>
    <br/>
    <input type="checkbox" id="Student" value="Male" name="studyStatus"><label for="Student">Student</label>
    <br />
    <input type="checkbox" id="Graduated" value="Female" name="studyStatus"><label for="Graduated">Graduated</label>
    <br/>
    <br/>
    <select name="select">
<optgroup label="Group 1">
<option value="AUC" selected>AUC</option> </optgroup>
<optgroup label="Group 2">
<option value="BUE">BUE</option> <option value="SHA">SHA</option>
</optgroup>
<optgroup label="GUC" disabled>
<option value="ComputerScience">CS</option> <option value="TeleCommunications">TeleC</option> <option value="InformationSystem">IS</option>
</optgroup>
</select>

<br/>
<button style="background-color:rgb(202, 32, 32);"><img  width="50" height="30" src="images/M27wVyvn5rFvMVg-Submit-Button-PNG-Photos.png"></button>
    </fieldset>

   </form>
